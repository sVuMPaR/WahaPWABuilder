name: CI

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main, feature]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build and test
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build
